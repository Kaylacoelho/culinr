<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#059669"/>

  <!-- Hanging loop at top of handle -->
  <circle cx="16" cy="5" r="2" stroke="white" stroke-width="1.5"/>

  <!-- Handle -->
  <line x1="16" y1="7" x2="16" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Collar where handle meets cage -->
  <line x1="13" y1="18" x2="19" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wire cage: 4 graceful loops -->
  <path d="M16 18 C9 19 9 27 16 29"  stroke="white" stroke-width="1" stroke-linecap="round"/>
  <path d="M16 18 C12 20 12 27 16 29" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <path d="M16 18 C20 20 20 27 16 29" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <path d="M16 18 C23 19 23 27 16 29"  stroke="white" stroke-width="1" stroke-linecap="round"/>
</svg>
